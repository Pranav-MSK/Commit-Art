        ## 🎨 Paint the Canvas

        Just edit the **title** above and submit.

        ### Format:
        Paint [A5] #FF5733

        ### Rules:
        - Rows: A–H
        - Columns: 1–8
        - HEX: 6-digit color

        ### Examples:
        - Paint [C3] #00FFAA
        - Paint [H8] #FF0000

        ---

        ⚠️ Only the **issue title** is processed.
